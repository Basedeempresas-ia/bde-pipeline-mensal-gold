name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile package
        run: python -m compileall bde_pipeline

      - name: Run tests
        run: python -m pytest -q tests

      - name: Check whitespace
        run: git diff --check
